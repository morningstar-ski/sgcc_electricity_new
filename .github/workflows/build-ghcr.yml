name: Build GHCR images

on:
  workflow_dispatch:
    inputs:
      version:
        description: Image tag to build
        required: true
        default: v1.8.2
  push:
    branches:
      - master
    paths:
      - Dockerfile-for-github-action
      - requirements.txt
      - scripts/**
      - config.yaml
      - .github/workflows/build-ghcr.yml

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize version
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="v1.8.2"
          fi
          if [[ "$VERSION" != v* ]]; then
            VERSION="v${VERSION}"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push architecture image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-for-github-action
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/sgcc_electricity-${{ matrix.arch }}:${{ steps.version.outputs.value }}
            ghcr.io/${{ github.repository_owner }}/sgcc_electricity-${{ matrix.arch }}:latest
